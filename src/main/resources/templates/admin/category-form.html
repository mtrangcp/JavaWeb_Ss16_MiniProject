<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${category.id == null ? 'Thêm mới danh mục' : 'Cập nhật danh mục'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>



<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${category.id == null ? 'Thêm mới danh mục' : 'Cập nhật danh mục'}"></h4>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{${category.id == null ? '/admin/category/save' : '/admin/category/update'}}"
                          th:object="${category}" method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label">Tên danh mục</label>
                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="Nhập tên danh mục..."
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Nhập mô tả..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between border-top pt-3">
                            <a th:href="@{/admin/category/list}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit"
                                    class="btn btn-success"
                                    th:text="${category.id == null ? 'Lưu mới' : 'Cập nhật'}">
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
