<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Form</title>
    <meta charset="UTF-8">
</head>
<body>

<h2 th:text="${product.id == null ? 'Thêm sản phẩm' : 'Sửa sản phẩm'}"></h2>

<form th:action="@{/admin/products/save}"
      th:object="${product}"
      method="post"
      enctype="multipart/form-data">

    <input type="hidden" th:field="*{id}"/>

    <!-- NAME -->
    <div>
        Tên:
        <input type="text" th:field="*{name}"/>
        <span style="color:red" th:errors="*{name}"></span>
    </div>

    <!-- PRICE -->
    <div>
        Giá:
        <input type="number" step="0.01" th:field="*{price}"/>
        <span style="color:red" th:errors="*{price}"></span>
    </div>

    <!-- STOCK -->
    <div>
        Tồn kho:
        <input type="number" th:field="*{stockQuantity}"/>
        <span style="color:red" th:errors="*{stockQuantity}"></span>
    </div>

    <!-- DESCRIPTION -->
    <div>
        Mô tả:
        <textarea th:field="*{description}"></textarea>
    </div>

    <!-- CATEGORY -->
    <div>
        Danh mục:
        <select th:field="*{category.id}">
            <option value="">-- Chọn danh mục --</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}">
            </option>
        </select>
    </div>

    <!-- IMAGE -->
    <div>
        Ảnh:
        <input type="file" name="file"/>
    </div>

    <!-- PREVIEW IMAGE -->
    <div th:if="${product.imageUrl != null}">
        <p>Ảnh hiện tại:</p>
        <img th:src="@{'/uploads/' + ${product.imageUrl}}" width="120"/>
    </div>

    <br/>

    <button type="submit">Lưu</button>
</form>

<br/>
<a th:href="@{/admin/products}">← Quay lại</a>

</body>
</html>
