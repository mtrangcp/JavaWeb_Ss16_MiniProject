<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
    <div class="container py-5">
        <h2>Giỏ hàng của bạn</h2>
        <table class="table table-bordered align-middle">
            <thead class="table-dark">
            <tr><th>Sản phẩm</th><th>Giá</th><th>Số lượng</th><th>Thành tiền</th><th>Hành động</th></tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${session.cart}">
                <td th:text="${entry.value.productName}"></td>
                <td th:text="${#numbers.formatDecimal(entry.value.price, 0, 'COMMA', 0, 'POINT')}"></td>
                <td>
                    <form th:action="@{/cart/update/{id}(id=${entry.key})}" method="post" class="d-flex">
                        <input type="number" name="qty" th:value="${entry.value.quantity}" min="1" class="form-control w-50">
                        <button type="submit" class="btn btn-sm btn-outline-primary ms-2">Sửa</button>
                    </form>
                </td>
                <td th:text="${#numbers.formatDecimal(entry.value.price * entry.value.quantity, 0, 'COMMA', 0, 'POINT')}"></td>
                <td><a th:href="@{/cart/remove/{id}(id=${entry.key})}" class="btn btn-danger btn-sm">Xóa</a></td>
            </tr>
            </tbody>
        </table>
        <div class="text-end">
            <h4>Tổng tiền: <span class="text-primary" th:text="${#numbers.formatDecimal(session.totalPrice, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ</h4>
            <a href="/" class="btn btn-secondary">Mua thêm</a>
            <a th:href="@{/checkout}" class="btn btn-success" th:if="${session.cart != null && !session.cart.isEmpty()}">Thanh toán</a>
        </div>
    </div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
